<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Amber gradient background rounded square -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a400"/>
      <stop offset="100%" stop-color="#f07c3a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>

  <!-- Coin circle (face) -->
  <circle cx="32" cy="32" r="22" fill="white" fill-opacity="0.92"/>

  <!-- Eyes -->
  <circle cx="24" cy="27" r="3" fill="#e8a400"/>
  <circle cx="40" cy="27" r="3" fill="#e8a400"/>

  <!-- Smile -->
  <path d="M22 37 Q32 46 42 37" stroke="#f07c3a" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Blush left -->
  <ellipse cx="18" cy="36" rx="5" ry="3" fill="#f07c3a" fill-opacity="0.28"/>
  <!-- Blush right -->
  <ellipse cx="46" cy="36" rx="5" ry="3" fill="#f07c3a" fill-opacity="0.28"/>

  <!-- Split dashed vertical line through coin -->
  <line x1="32" y1="11" x2="32" y2="53" stroke="#e8a400" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 3.5"/>
</svg>